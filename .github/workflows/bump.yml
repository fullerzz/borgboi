name: Bump version

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    runs-on: ubuntu-latest
    name: "Bump version and generate changelog"
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.19"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Generate changelog with git-cliff
        run: |
          NEXT_VERSION=$(uv run cz bump --get-next)
          GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" uv run git-cliff --tag "v${NEXT_VERSION}" --github-repo "${{ github.repository }}" --output body.md --prepend CHANGELOG.md --unreleased
      - id: cz
        name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: false
          commit: false
          push: false
      - name: Update lockfile after version bump
        if: ${{ steps.cz.outputs.next_version != steps.cz.outputs.previous_version }}
        run: uv sync
      - name: Commit and tag bump changes
        if: ${{ steps.cz.outputs.next_version != steps.cz.outputs.previous_version }}
        run: |
          git add CHANGELOG.md pyproject.toml uv.lock
          git commit -m "bump: version ${{ steps.cz.outputs.previous_version }} -> ${{ steps.cz.outputs.next_version }}"
          git tag "v${{ steps.cz.outputs.next_version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.cz.outputs.next_version }}"
      - name: Release
        if: ${{ steps.cz.outputs.next_version != steps.cz.outputs.previous_version }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: "body.md"
          tag_name: v${{ steps.cz.outputs.next_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
