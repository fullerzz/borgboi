name: Preview Changelog

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  changelog-preview:
    name: Preview changelog for unreleased commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.31"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Generate preview changelog
        run: |
          uv run just changelog-unreleased
          cat PREVIEW_CHANGELOG.md >> "$GITHUB_STEP_SUMMARY"
          # Prepend hidden marker for find-comment to locate on subsequent runs
          printf '<!-- changelog-preview -->\n' | cat - PREVIEW_CHANGELOG.md > PREVIEW_CHANGELOG_WITH_MARKER.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find existing changelog comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- changelog-preview -->"

      - name: Create or update changelog comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: PREVIEW_CHANGELOG_WITH_MARKER.md
          edit-mode: replace
