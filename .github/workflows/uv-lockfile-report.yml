name: uv Lockfile Report

on:
  pull_request:
    paths:
      - "uv.lock"

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Report
        uses: mw-root/uv-lock-report@9608aee0a26ebaf5dbfb3f829a9cc2007afc87df # v0.14.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
