name: uv Lockfile Report

on:
  pull_request:
    paths:
      - "uv.lock"

permissions:
  contents: read
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Report
        uses: mw-root/uv-lock-report@9608aee0a26ebaf5dbfb3f829a9cc2007afc87df # v0.14.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
